services:
  aio-arr:
    # Pull the published multi-arch image. Pin a version with
    # `AIO_ARR_IMAGE=erenatbas/aio-arr:0.1.0 docker compose up -d`. Developers who
    # want to build from source add the override:
    # `docker compose -f docker-compose.yml -f docker-compose.build.yml up --build`.
    image: ${AIO_ARR_IMAGE:-erenatbas/aio-arr:latest}
    container_name: aio-arr
    env_file: .env
    ports:
      - "3223:3223"
    volumes:
      # Persists the SQLite database and the Trakt token store so the one-time
      # device authorisation survives restarts.
      - ./data:/app/data
      # Mount media libraries if you use Deletarr. Keep these examples
      # read-write only when you intend to delete reviewed junk from the UI.
      # - /path/to/movies:/media/movies
      # - /path/to/tv:/media/tv
    restart: unless-stopped
    # To reach Radarr/Sonarr/Seer on the same Docker network, either set
    # the *arr URLs to host-reachable addresses, or attach this service to your
    # existing media network, e.g.:
    #
    # networks:
    #   - media
    #
    # networks:
    #   media:
    #     external: true
