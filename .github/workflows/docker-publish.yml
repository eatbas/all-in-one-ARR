name: Build and publish Docker image

on:
  push:
    # Release tags only (vX.Y.Z) — each segment must begin with a digit, so a
    # non-version tag such as `vbeta` never triggers the workflow. The workflow
    # runs solely on these tags: commits to `main` and pull requests do not
    # trigger it at all (no per-commit CI, no per-commit image builds).
    tags: ['v[0-9]*.[0-9]*.[0-9]*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing vX.Y.Z tag to publish as a GitHub Release (backfill)
        required: true
        type: string

env:
  IMAGE_NAME: erenatbas/aio-arr

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    # Runs on a release-tag push; skipped for the workflow_dispatch backfill,
    # which only (re)creates the GitHub Release for an already-built tag.
    if: github.event_name != 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: pip

      - name: Install backend
        run: python -m pip install -e "./backend[dev]" -c backend/requirements.lock

      - name: Run backend lint (ruff)
        working-directory: backend
        run: ruff check .

      - name: Run backend format check (ruff)
        working-directory: backend
        run: ruff format --check .

      - name: Run backend type check (mypy)
        working-directory: backend
        run: mypy

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest

  frontend-checks:
    runs-on: ubuntu-latest
    # Runs on a release-tag push; skipped for the workflow_dispatch backfill,
    # which only (re)creates the GitHub Release for an already-built tag.
    if: github.event_name != 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: pip

      - name: Install backend for OpenAPI export
        run: python -m pip install -e "./backend[dev]" -c backend/requirements.lock

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # Build the SPA before exporting the schema: the FastAPI app registers the
      # SPA HTML routes only when frontend/dist exists (core/app.py::_mount_frontend),
      # so the OpenAPI export and its git-diff drift check must run against a built
      # bundle to reproduce the committed schema/openapi.json.
      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Generate OpenAPI schema and TypeScript types
        run: |
          python scripts/export_openapi.py
          npm --prefix frontend run api:types
          git diff --exit-code -- schema/openapi.json frontend/src/shared/lib/generated

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Run frontend format check
        working-directory: frontend
        run: npm run format:check

      - name: Run frontend type check
        working-directory: frontend
        run: npm run test:types -- --pretty false

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

  build-and-push:
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks]
    # The workflow only runs on release-tag pushes and the workflow_dispatch
    # backfill (commits to `main` and pull requests no longer trigger it), so
    # this guard now only separates a tag push (build + publish) from the
    # backfill (skip). The tag push produces docker.io/erenatbas/aio-arr:X.Y.Z
    # (+ :X.Y and :latest); the startsWith check stays as defence-in-depth so a
    # future re-added branch trigger can never publish from `main`.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          # Docker Hub username (not the GitHub owner `eatbas`) — hard-coded to
          # match IMAGE_NAME so publishing needs only the DOCKERHUB_TOKEN secret.
          username: erenatbas
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: docker.io/${{ env.IMAGE_NAME }}
          # Default flavour is latest=auto, so a pushed vX.Y.Z tag also refreshes
          # :latest. Only release tags reach this job now, so the default-branch
          # :latest and the per-commit :sha tags are removed.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Skip provenance/SBOM attestations so Docker Hub lists only the two real
          # architectures instead of an extra "unknown/unknown" manifest entry.
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-github-release:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: >-
      always() &&
      ((github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') &&
      needs.build-and-push.result == 'success') ||
      (github.event_name == 'workflow_dispatch' && inputs.release_tag != ''))
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release: '$RELEASE_TAG' is not a vX.Y.Z tag" >&2
            exit 1
          fi

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "GitHub Release $RELEASE_TAG already exists"
            exit 0
          fi

          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes \
            --title "$RELEASE_TAG"
