name: Build and publish Docker image

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: erenatbas/aio-arr

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install backend
        run: python -m pip install -e "./backend[dev]"

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest

  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install backend for OpenAPI export
        run: python -m pip install -e "./backend[dev]"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate OpenAPI schema and TypeScript types
        run: |
          python scripts/export_openapi.py
          npm --prefix frontend run api:types
          git diff --exit-code -- schema/openapi.json frontend/src/shared/lib/generated

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Run frontend type check
        working-directory: frontend
        run: npm run test:types -- --pretty false

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  build-and-push:
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          # Docker Hub username (not the GitHub owner `eatbas`) — hard-coded to
          # match IMAGE_NAME so publishing needs only the DOCKERHUB_TOKEN secret.
          username: erenatbas
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: docker.io/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Skip provenance/SBOM attestations so Docker Hub lists only the two real
          # architectures instead of an extra "unknown/unknown" manifest entry.
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
